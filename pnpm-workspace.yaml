packages:
  - apps/*
  - packages/*
allowBuilds:
  esbuild: true
  msw: true
  sharp: true
  "@prisma/engines": true
  prisma: true
# Supply-chain: refuse versions published < 1 day ago (blocks fresh malicious releases)
minimumReleaseAge: 1440
# Supply-chain: block git/http/file (exotic) transitive deps
blockExoticSubdeps: true
catalog:
  dotenv: ^17.2.2
  zod: ^4.1.13
  typescript: ^6
  "@trpc/server": ^11.16.0
  better-auth: 1.6.19
  "@better-auth/passkey": 1.6.19
  resend: ^4.0.0
  "@types/express": ^5.0.1
  lucide-react: ^0.546.0
  next-themes: ^0.4.6
  react: ^19.2.6
  react-dom: ^19.2.6
  react-hook-form: ^7.80.0
  "@hookform/resolvers": ^5.4.0
  sonner: ^2.0.7
  "@trpc/client": ^11.16.0
  "@polar-sh/better-auth": ^1.8.4
  "@types/react": ^19.2.15
  "@types/react-dom": ^19.2.3
  tailwindcss: ^4.1.18
  "@prisma/client": ^7.8.0
  superjson: ^2.2.2
  vitest: ^3.2.4
  "@zxcvbn-ts/core": 4.1.2
  "@zxcvbn-ts/language-common": 4.1.2
  "@zxcvbn-ts/language-en": 4.1.1
